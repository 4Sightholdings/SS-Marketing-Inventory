<script>

/* ✅ SAFE VALUE HELPER */
function getVal(obj, key){
    return obj[key] || obj[key.trim?.()] || "";
}

/* ✅ FIXED DATE PARSER */
function parseDate(v){

    if(!v) return null;

    if(typeof v === "number"){
        return new Date((v - 25569) * 86400 * 1000);
    }

    // Handle multiple formats
    let d = new Date(v);
    if(!isNaN(d)) return d;

    d = new Date(v.replace(/(\d{2})\/(\d{2})\/(\d{4})/, "$3-$2-$1"));
    return isNaN(d) ? null : d;
}

/* ✅ UPDATED RENDER */
function render(){

    if(!datasets.length) return;

    let raw = datasets[activeDataset].data;

    console.log("RAW DATA:", raw); // 👈 debug

    let grouped={};

    raw.forEach(d=>{

        let tracker = getVal(d, "Tracker");

        if(["Logo","Facebook","LinkedIn","Youtube"].includes(tracker)) return;

        let banner = getVal(d, "Template") || "Unknown";
        let email = getVal(d, "Receiver") || "Unknown";
        let sender = getVal(d, "Sender");

        let date = parseDate(getVal(d, "Time Clicked"));

        if(!date) return;

        let key=email+"|"+banner;

        if(!grouped[key]){
            grouped[key]={
                email,
                sender,
                banner,
                first:date,
                days:new Set([date.toDateString()])
            };
        } else {
            if(date < grouped[key].first) grouped[key].first=date;
            grouped[key].days.add(date.toDateString());
        }
    });

    let final=Object.values(grouped);

    console.log("FINAL:", final); // 👈 debug

    final.sort((a,b)=>b.days.size - a.days.size);

    let clusters={CP:[],BE:[],IT:[],OT:[]};

    final.forEach(d=>{
        let t=d.banner.toLowerCase();

        if(t.includes("copilot")||t.includes("partner")) clusters.CP.push(d);
        else if(t.includes("business")) clusters.BE.push(d);
        else if(t.includes("erp")) clusters.IT.push(d);
        else clusters.OT.push(d);
    });

    renderCluster(clusters[activeCluster]);
}

</script>
