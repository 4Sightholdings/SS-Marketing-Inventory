<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background: radial-gradient(circle at top,#0a2a5e,#001833 80%);
    color:white;
    padding:20px;
}

/* HEADER */
.header { text-align:center; }
.header h1 { font-size:36px; }
.subtitle { color:#9bb7ff; margin-bottom:20px; }

/* BUTTONS */
.filters {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}
input,button {
    padding:10px;
    border-radius:8px;
    border:none;
}
button {
    background:#0078d4;
    color:white;
    cursor:pointer;
}

/* DASHBOARD */
.dashboard {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
}
.card {
    background:rgba(255,255,255,0.12);
    padding:15px;
    width:150px;
    border-radius:8px;
    text-align:center;
}
.value { font-size:22px; font-weight:bold; }

/* TABS */
.tabs {
    display:flex;
    justify-content:center;
}
.tab {
    margin:3px;
    padding:8px 16px;
    background:rgba(255,255,255,0.2);
    border-radius:6px;
    cursor:pointer;
}
.tab.active { background:white; color:#002f6c; }

/* CLUSTERS */
.cluster { display:none; }
.cluster.active { display:block; }

.cluster-title {
    padding:10px;
    border-radius:6px;
}
.cp { background:#ff4d4d; }
.be { background:#4da6ff; }
.it { background:#ffd633; color:black; }
.ot { background:#33cc99; }

/* DROPDOWN */
.banner-header {
    background:rgba(255,255,255,0.15);
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    cursor:pointer;
}

.banner-content {
    display:none;
    padding:10px;
}

/* TABLE FIX */
table {
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th, td {
    padding:10px;
    text-align:left;
}

th { background:#002f6c; }

td {
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* CONSISTENT WIDTHS */
th:nth-child(1), td:nth-child(1) { width:35%; }
th:nth-child(2), td:nth-child(2) { width:25%; }
th:nth-child(3), td:nth-child(3) { width:25%; }
th:nth-child(4), td:nth-child(4) { width:15%; }

</style>
</head>

<body>

<div class="header">
<h1>4Sight Click Intelligence</h1>
<div class="subtitle">Interactive Campaign Engagement Dashboard</div>
</div>

<div class="filters">
<input type="file" id="fileInput">
<button onclick="processData()">Deploy</button>
<button onclick="clearData()">Clear</button>
</div>

<div class="dashboard">
<div class="card"><div id="total" class="value">--</div>Total</div>
<div class="card"><div id="leads" class="value">--</div>Leads</div>
</div>

<div class="tabs">
<div class="tab active" onclick="showCluster('CP')" id="tab-CP">CP</div>
<div class="tab" onclick="showCluster('BE')" id="tab-BE">BE</div>
<div class="tab" onclick="showCluster('IT')" id="tab-IT">IT</div>
<div class="tab" onclick="showCluster('OT')" id="tab-OT">OT</div>
</div>

<div id="CP" class="cluster active"><div class="cluster-title cp">Channel Partner</div><div id="cpTable"></div></div>
<div id="BE" class="cluster"><div class="cluster-title be">BE</div><div id="beTable"></div></div>
<div id="IT" class="cluster"><div class="cluster-title it">IT</div><div id="itTable"></div></div>
<div id="OT" class="cluster"><div class="cluster-title ot">OT</div><div id="otTable"></div></div>

<script>

let rawData = [];

/* ✅ LOAD STORED DATA */
window.onload = function(){
    let data = localStorage.getItem("clickData");
    if(data){
        rawData = JSON.parse(data);
        processData();
    }
};

/* ✅ LOAD NEW FILE */
fileInput.addEventListener("change", e=>{
    let reader = new FileReader();

    reader.onload = (evt)=>{
        let wb = XLSX.read(evt.target.result,{type:'array'});
