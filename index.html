<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>

body {
    font-family: Segoe UI;
    background:#0f2f63;
    color:white;
    margin:0;
}

.container {
    padding:30px;
}

h1 {
    margin-bottom:20px;
}

/* Controls */
.controls {
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

button,input {
    padding:8px 12px;
    border:none;
    border-radius:6px;
}

button {
    background:#1e88e5;
    color:white;
    cursor:pointer;
}

/* Cluster tabs */
.cluster-tabs {
    margin-bottom:20px;
}

.cluster-tab {
    padding:8px 16px;
    background:#2c4fa3;
    margin-right:6px;
    border-radius:8px;
    cursor:pointer;
}

.cluster-tab.active {
    background:white;
    color:#002f6c;
}

/* Card */
.card {
    background:#163a78;
    padding:20px;
    border-radius:12px;
}

/* Groups */
.group {
    background:#1b4a96;
    border-radius:8px;
    margin-bottom:12px;
}

.group-header {
    padding:12px;
    font-weight:600;
    cursor:pointer;
}

.group-content {
    display:none;
    padding:10px;
}

/* Tables */
table {
    width:100%;
    border-collapse:collapse;
    margin-bottom:10px;
}

th {
    background:#123265;
    padding:8px;
}

td {
    padding:6px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* Detail rows */
.subtable {
    margin-top:8px;
    background:#0d2c5c;
}

</style>
</head>

<body>

<div class="container">

<h1>4Sight Click Intelligence</h1>

<div class="controls">
<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>
<button onclick="clearAll()">Clear</button>
</div>

<div class="cluster-tabs">
<span class="cluster-tab active" onclick="setCluster('CP')" id="c-CP">CP</span>
<span class="cluster-tab" onclick="setCluster('BE')" id="c-BE">BE</span>
<span class="cluster-tab" onclick="setCluster('IT')" id="c-IT">IT</span>
<span class="cluster-tab" onclick="setCluster('OT')" id="c-OT">OT</span>
</div>

<div class="card">
<div id="output"></div>
</div>

</div>

<script>

let data = [];
let activeCluster = "CP";

/* Upload */
function upload(){
    let file = fileInput.files[0];
    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(e){
        let wb = XLSX.read(e.target.result,{type:'array'});

        let json = XLSX.utils.sheet_to_json(
            wb.Sheets[wb.SheetNames[0]],
            {defval:"", raw:false}
        );

        data = json.map(r=>{
            let clean = {};
            Object.keys(r).forEach(k=>{
                clean[k.trim()] = r[k];
            });
            return clean;
        });

        render();
    };

    reader.readAsArrayBuffer(file);
}

function clearAll(){
    data=[];
    output.innerHTML="";
}

function setCluster(c){
    activeCluster=c;

    document.querySelectorAll(".cluster-tab")
    .forEach(t=>t.classList.remove("active"));

    document.getElementById("c-"+c).classList.add("active");

    render();
}

function parseDate(v){
    let d=new Date(v);
    return isNaN(d)?null:d;
}

function render(){

    if(!data.length) return;

    let grouped={};

    data.forEach(d=>{

        if(["Logo","Facebook","LinkedIn","Youtube"].includes(d.Tracker)) return;

        let banner=d.Template || "Unknown";
        let email=d.Receiver || "Unknown";

        let date=parseDate(d["Time Clicked"]);
        if(!date) return;

        let key=email+"|"+banner;

        if(!grouped[key]){
            grouped[key]={
                email,
                sender:d.Sender,
                banner,
                first:date,
                days:new Set([date.toDateString()]),
                clicks:[d]
            };
        } else {
            grouped[key].clicks.push(d);
            grouped[key].days.add(date.toDateString());
            if(date < grouped[key].first) grouped[key].first=date;
        }

    });

    let final=Object.values(grouped);

    let clusters={CP:[],BE:[],IT:[],OT:[]};

    /* ✅ FINAL CLUSTER LOGIC */
    final.forEach(d=>{

        const t = d.banner.toLowerCase();

        if(
            t.includes("copilot") ||
            t.includes("reseller") ||
            t.includes("summit") ||
            t.includes("expo") ||
            t.includes("event_") ||
            t.includes("maas") ||
            t.includes("marketplace")
        ){
            clusters.CP.push(d);
        }
        else if(
            t.includes("be_") ||
            t.includes("business") ||
            t.includes("data") ||
            t.includes("dev")
        ){
            clusters.BE.push(d);
        }
        else if(
            t.includes("erp") ||
            t.includes("acumatica") ||
            t.includes("dynamics")
        ){
            clusters.IT.push(d);
        }
        else{
            clusters.OT.push(d);
        }

    });

    renderCluster(clusters[activeCluster]);
}

function renderCluster(data){

    let banners={};

    data.forEach(d=>{
        if(!banners[d.banner]) banners[d.banner]=[];
        banners[d.banner].push(d);
    });

    let html="";

    Object.keys(banners).forEach(name=>{

        html+=`
        <div class="group">
            <div class="group-header" onclick="toggle(this)">
                ${name}
            </div>

            <div class="group-content">
            <table>
                <tr>
                    <th>Email</th>
                    <th>Sender</th>
                    <th>First Click</th>
                    <th>Days</th>
                </tr>`;

        banners[name].forEach(r=>{

            html+=`
            <tr>
                <td>${r.email}</td>
                <td>${r.sender}</td>
                <td>${r.first.toLocaleString()}</td>
                <td>${r.days.size}</td>
            </tr>`;

            /* ✅ DETAILED CLICK DATA (REPORT STYLE) */
            html+=`
            <tr>
                <td colspan="4">
                    <table class="subtable">
                        <tr>
                            <th>Clicked Time</th>
                            <th>Tracker</th>
                        </tr>`;

            r.clicks.forEach(c=>{
                html+=`
                <tr>
                    <td>${c["Time Clicked"]}</td>
                    <td>${c.Tracker}</td>
                </tr>`;
            });

            html+=`</table></td></tr>`;
        });

        html+=`</table></div></div>`;
    });

    output.innerHTML=html;
}

function toggle(el){
    let c=el.nextElementSibling;
    c.style.display = c.style.display==="block"?"none":"block";
}

</script>

</body>
</html>
