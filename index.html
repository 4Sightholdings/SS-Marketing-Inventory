<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background:#102f66;
    color:white;
    margin:0;
}

.container {
    padding:30px;
}

h1 {
    margin-bottom:20px;
    font-weight:500;
}

/* CONTROLS */
.controls {
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:20px;
}

button {
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#1e88e5;
    color:white;
    cursor:pointer;
}

/* CLUSTERS */
.cluster-tabs {
    margin-bottom:20px;
}

.cluster-tab {
    padding:8px 14px;
    margin-right:8px;
    background:#2c4fa3;
    border-radius:8px;
    cursor:pointer;
}

.cluster-tab.active {
    background:white;
    color:#002f6c;
}

/* CARD */
.card {
    background:#163a78;
    padding:20px;
    border-radius:12px;
}

/* GROUPS */
.group {
    background:#1b4a96;
    border-radius:8px;
    margin-bottom:12px;
}

.group-header {
    padding:12px;
    cursor:pointer;
}

.group-content {
    display:none;
    padding:10px;
}

table {
    width:100%;
}

th {
    background:#123265;
    padding:8px;
}

td {
    padding:6px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="container">

<h1>4Sight Click Intelligence</h1>

<div class="controls">
<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>
<button onclick="clearAll()">Clear</button>
</div>

<div class="cluster-tabs">
<span class="cluster-tab active" onclick="setCluster('CP')" id="c-CP">CP</span>
<span class="cluster-tab" onclick="setCluster('BE')" id="c-BE">BE</span>
<span class="cluster-tab" onclick="setCluster('IT')" id="c-IT">IT</span>
<span class="cluster-tab" onclick="setCluster('OT')" id="c-OT">OT</span>
</div>

<div class="card">
<div id="output"></div>
</div>

</div>

<script>

let data = [];
let activeCluster = "CP";

/* UPLOAD */
function upload(){

    let file = fileInput.files[0];
    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(e){

        let wb = XLSX.read(e.target.result,{type:'array'});

        let json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{
            defval:"",
            raw:false
        });

        data = json.map(r=>{
            let clean={};
            Object.keys(r).forEach(k=>{
                clean[k.trim()] = r[k];
            });
            return clean;
        });

        render();
    };

    reader.readAsArrayBuffer(file);
}

/* CLEAR */
function clearAll(){
    data=[];
    output.innerHTML="";
}

/* CLUSTER SWITCH */
function setCluster(c){
    activeCluster=c;

    document.querySelectorAll(".cluster-tab")
    .forEach(t=>t.classList.remove("active"));

    document.getElementById("c-"+c).classList.add("active");

    render();
}

/* DATE */
function parseDate(v){
    let d=new Date(v);
    return isNaN(d)?null:d;
}

/* RENDER */
function render(){

    if(!data.length) return;

    let grouped={};

    data.forEach(d=>{

        if(["Logo","Facebook","LinkedIn","Youtube"].includes(d.Tracker)) return;

        let banner=d.Template||"Unknown";
        let email=d.Receiver||"Unknown";
        let sender=d.Sender||"";

        let date=parseDate(d["Time Clicked"]);
        if(!date) return;

        let key=email+"|"+banner;

        if(!grouped[key]){
            grouped[key]={
                email,sender,banner,
                first:date,
                days:new Set([date.toDateString()])
            };
        } else {
            if(date<grouped[key].first) grouped[key].first=date;
            grouped[key].days.add(date.toDateString());
        }

    });

    let final=Object.values(grouped);
    let clusters={CP:[],BE:[],IT:[],OT:[]};

    /* ✅ HARD MATCH CLUSTERING */
    final.forEach(d=>{

        const t = d.banner.toLowerCase();

        /* EXCLUDE */
        if(
            t.includes("nps") ||
            t.includes("brochure") ||
            t.includes("download") ||
            t.includes("holiday") ||
            t.includes("support")
        ){
            return;
        }

        /* CP */
        if(
            t.includes("copilot") ||
            t.includes("reseller") ||
            t.includes("cloud champion") ||
            t.includes("partner summit") ||
            t.includes("blitz") ||
            t.includes("maas") ||
            t.includes("marketplace") ||
            t.includes("summit") ||
            t.includes("expo") ||
            t.includes("event_")
        ){
            clusters.CP.push(d);
        }

        /* BE */
        else if(
            t.includes("be_") ||
            t.includes("business") ||
            t.includes("dev") ||
            t.includes("data") ||
            t.includes("esg") ||
            t.includes("acm") ||
            t.includes("mde") ||
            t.includes("citizen") ||
            t.includes("4adopt")
        ){
            clusters.BE.push(d);
        }

        /* IT */
        else if(
            t.includes("erp") ||
            t.includes("acumatica") ||
            t.includes("dynamics") ||
            t.includes("f&o") ||
            t.includes("sei") ||
            t.includes("fixed asset")
        ){
            clusters.IT.push(d);
        }

        /* OT */
        else if(
            t.includes("simio") ||
            t.includes("automation") ||
            t.includes("optimisation") ||
            t.includes("simulation") ||
            t.includes("opx")
        ){
            clusters.OT.push(d);
        }

        /* FALLBACK */
        else{
            clusters.BE.push(d);
        }

    });

    renderCluster(clusters[activeCluster]);
}

/* DISPLAY */
function renderCluster(data){

    let banners={};

    data.forEach(d=>{
        if(!banners[d.banner]) banners[d.banner]=[];
        banners[d.banner].push(d);
    });

    let html="";

    Object.keys(banners).forEach(name=>{

        html+=`
        <div class="group">
            <div class="group-header" onclick="toggle(this)">
                ${name}
            </div>

            <div class="group-content">
                <table>
                    <tr>
                        <th>Email</th>
                        <th>Sender</th>
                        <th>First Click</th>
                        <th>Days</th>
                    </tr>`;

        banners[name].forEach(r=>{
            html+=`
                <tr>
                    <td>${r.email}</td>
                    <td>${r.sender}</td>
                    <td>${r.first.toLocaleString()}</td>
                    <td>${r.days.size}</td>
                </tr>`;
        });

        html+=`</table></div></div>`;
    });

    output.innerHTML=html;
}

/* TOGGLE */
function toggle(el){
    let c=el.nextElementSibling;
    c.style.display = c.style.display==="block"?"none":"block";
}

</script>

</body>
</html>
