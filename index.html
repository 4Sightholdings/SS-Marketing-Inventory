<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background: radial-gradient(circle at top,#0a2a5e,#001833 80%);
    color:white;
    padding:20px;
}

/* HEADER */
.header { text-align:center; }
.header h1 { font-size:36px; }

/* BUTTONS */
.filters {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}
button,input {
    padding:10px;
    border-radius:8px;
    border:none;
}
button {
    background:#0078d4;
    color:white;
    cursor:pointer;
}

/* DATASET TABS */
.dataset-tabs {
    display:flex;
    justify-content:flex-start;
    gap:10px;
    margin-bottom:10px;
    flex-wrap:wrap;
}
.dataset-tab {
    padding:6px 12px;
    background:rgba(255,255,255,0.2);
    border-radius:6px;
    cursor:pointer;
}
.dataset-tab.active {
    background:white;
    color:#002f6c;
}

/* CLUSTER TABS */
.clusters {
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:15px;
}
.cluster-tab {
    padding:8px 16px;
    background:rgba(255,255,255,0.2);
    border-radius:6px;
    cursor:pointer;
}
.cluster-tab.active {
    background:white;
    color:#002f6c;
}

/* CONTENT */
.banner-header {
    margin-top:10px;
    padding:10px;
    background:rgba(255,255,255,0.15);
    border-radius:6px;
    cursor:pointer;
}
.banner-content {
    display:none;
    padding:10px;
}

table {
    width:100%;
    border-collapse:collapse;
}
th,td {
    padding:8px;
    text-align:left;
}
th { background:#002f6c; }
td { border-bottom:1px solid rgba(255,255,255,0.1); }

</style>
</head>

<body>

<div class="header">
<h1>4Sight Click Intelligence</h1>
</div>

<div class="filters">
<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>
<button onclick="clearAll()">Clear</button>
</div>

<div id="datasetTabs" class="dataset-tabs"></div>

<div class="clusters">
<div class="cluster-tab active" onclick="switchCluster('CP')" id="c-CP">CP</div>
<div class="cluster-tab" onclick="switchCluster('BE')" id="c-BE">BE</div>
<div class="cluster-tab" onclick="switchCluster('IT')" id="c-IT">IT</div>
<div class="cluster-tab" onclick="switchCluster('OT')" id="c-OT">OT</div>
</div>

<div id="output"></div>

<script>

let datasets=[];
let activeDataset=0;
let activeCluster="CP";

/* LOAD STORAGE */
window.onload=()=>{
    let s=localStorage.getItem("clickDB");
    if(s){
        datasets=JSON.parse(s);
        renderTabs();
        render();
    }
};

/* UPLOAD */
function upload(){

    let file=fileInput.files[0];
    if(!file) return;

    let reader=new FileReader();

    reader.onload=(e)=>{
        let wb=XLSX.read(e.target.result,{type:'array'});
        let data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

        let dates=data.map(d=>new Date(d["Time Clicked"]))
                      .filter(d=>!isNaN(d))
                      .sort((a,b)=>a-b);

        let label="Unknown Dates";
        if(dates.length){
            let start=dates[0].toLocaleDateString();
            let end=dates[dates.length-1].toLocaleDateString();
            label=start+" → "+end;
        }

        datasets.unshift({label,data}); // newest first

        localStorage.setItem("clickDB",JSON.stringify(datasets));

        renderTabs();
        render();

        fileInput.value="";
    };

    reader.readAsArrayBuffer(file);
}

/* CLEAR */
function clearAll(){
    localStorage.removeItem("clickDB");
    location.reload();
}

/* DATASET TABS */
function renderTabs(){
    let html="";
    datasets.forEach((d,i)=>{
        html+=`<div class="dataset-tab ${i===activeDataset?'active':''}" onclick="setDataset(${i})">
        ${d.label}
        </div>`;
    });
    datasetTabs.innerHTML=html;
}

function setDataset(i){
    activeDataset=i;
    renderTabs();
    render();
}

/* CLUSTER SWITCH */
function switchCluster(c){
    activeCluster=c;
    document.querySelectorAll(".cluster-tab").forEach(t=>t.classList.remove("active"));
    document.getElementById("c-"+c).classList.add("active");
    render();
}

/* DATE PARSE */
function parseDate(v){
    let d=new Date(v);
    return isNaN(d)?null:d;
}

/* PROCESS */
function render(){

    if(!datasets.length) return;

    let raw=datasets[activeDataset].data;

    let grouped={};

    raw.forEach(d=>{
        if(["Logo","Facebook","LinkedIn","Youtube"].includes(d.Tracker)) return;

        let banner=d.Template||"Unknown";
        let email=d.Receiver||"Unknown";
        let date=parseDate(d["Time Clicked"]);
        if(!date) return;

        let key=email+"|"+banner;

        if(!grouped[key]){
            grouped[key]={
                email,
                sender:d.Sender,
                banner,
                first:date,
                days:new Set([date.toDateString()])
            };
        } else {
            if(date < grouped[key].first) grouped[key].first=date;
            grouped[key].days.add(date.toDateString());
        }
    });

    let final=Object.values(grouped);

    final.sort((a,b)=>b.days.size-a.days.size);

    let clusters={CP:[],BE:[],IT:[],OT:[]};

    final.forEach(d=>{
        let t=d.banner.toLowerCase();
        if(t.includes("copilot")||t.includes("partner")) clusters.CP.push(d);
        else if(t.includes("business")) clusters.BE.push(d);
        else if(t.includes("erp")||t.includes("webinar")) clusters.IT.push(d);
        else if(t.includes("ai")||t.includes("stages")) clusters.OT.push(d);
    });

    renderCluster(clusters[activeCluster]);
}

/* RENDER CLUSTER */
function renderCluster(data){

    let banners={};
    data.forEach(d=>{
        if(!banners[d.banner]) banners[d.banner]=[];
        banners[d.banner].push(d);
    });

    let html="";

    Object.keys(banners).forEach(banner=>{

        html+=`
        <div class="banner-header" onclick="toggle(this)">
        ${banner}
        </div>

        <div class="banner-content">
        <table>
        <tr>
            <th>Email</th>
            <th>Sender</th>
            <th>Date Clicked</th>
            <th>Days</th>
        </tr>`;

        banners[banner].forEach(r=>{
            html+=`
            <tr>
                <td>${r.email}</td>
                <td>${r.sender}</td>
                <td>${r.first.toLocaleString()}</td>
                <td>${r.days.size}</td>
            </tr>`;
        });

        html+="</table></div>";
    });

    output.innerHTML=html;
}

/* DROPDOWN */
function toggle(el){
    let c=el.nextElementSibling;
    c.style.display=(c.style.display==="block")?"none":"block";
}

</script>

</body>
</html>
