<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence Report</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>

body {
    font-family: Segoe UI;
    background:#ffffff;
    color:#333;
    margin:0;
    padding:40px;
}

/* HEADER */
h1 {
    color:#003366;
    font-weight:600;
    margin-bottom:10px;
}

.sub {
    color:#666;
    margin-bottom:30px;
}

/* Controls */
.controls {
    margin-bottom:25px;
}

button {
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#0078d4;
    color:white;
    cursor:pointer;
}

/* Clusters */
.cluster-tabs {
    margin-bottom:25px;
}

.cluster-tab {
    display:inline-block;
    padding:8px 16px;
    margin-right:8px;
    background:#e6eef8;
    border-radius:6px;
    cursor:pointer;
}

.cluster-tab.active {
    background:#003366;
    color:white;
}

/* SECTION */
.section {
    margin-bottom:30px;
}

/* Banner block */
.banner-title {
    font-size:16px;
    font-weight:600;
    color:#003366;
    margin-bottom:8px;
}

/* Table */
table {
    width:100%;
    border-collapse:collapse;
    margin-bottom:20px;
}

th {
    background:#003366;
    color:white;
    text-align:left;
    padding:8px;
}

td {
    padding:8px;
    border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<h1>4Sight Click Intelligence</h1>
<div class="sub">Campaign Engagement Report</div>

<div class="controls">
<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>
<button onclick="clearAll()">Clear</button>
</div>

<div class="cluster-tabs">
<span class="cluster-tab active" onclick="setCluster('CP')" id="c-CP">CP</span>
<span class="cluster-tab" onclick="setCluster('BE')" id="c-BE">BE</span>
<span class="cluster-tab" onclick="setCluster('IT')" id="c-IT">IT</span>
<span class="cluster-tab" onclick="setCluster('OT')" id="c-OT">OT</span>
</div>

<div id="output"></div>

<script>

let data = [];
let activeCluster = "CP";

/* Upload */
function upload(){

    let file = fileInput.files[0];
    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(e){

        let wb = XLSX.read(e.target.result,{type:'array'});

        let json = XLSX.utils.sheet_to_json(
            wb.Sheets[wb.SheetNames[0]],
            {defval:"", raw:false}
        );

        data = json.map(r=>{
            let clean = {};
            Object.keys(r).forEach(k=>{
                clean[k.trim()] = r[k];
            });
            return clean;
        });

        render();
    };

    reader.readAsArrayBuffer(file);
}

/* Clear */
function clearAll(){
    data=[];
    output.innerHTML="";
}

/* Cluster toggle */
function setCluster(c){
    activeCluster=c;

    document.querySelectorAll(".cluster-tab")
    .forEach(t=>t.classList.remove("active"));

    document.getElementById("c-"+c).classList.add("active");

    render();
}

/* Date */
function parseDate(v){
    let d=new Date(v);
    return isNaN(d)?null:d;
}

/* Render */
function render(){

    if(!data.length) return;

    let grouped={};

    data.forEach(d=>{

        if(["Logo","Facebook","LinkedIn","Youtube"].includes(d.Tracker)) return;

        let banner = d.Template || "Unknown";
        let email  = d.Receiver || "Unknown";
        let sender = d.Sender || "";

        let date = parseDate(d["Time Clicked"]);
        if(!date) return;

        let key = email + "|" + banner;

        if(!grouped[key]){
            grouped[key]={
                email,sender,banner,
                first:date,
                days:new Set([date.toDateString()])
            };
        } else {
            if(date < grouped[key].first) grouped[key].first=date;
            grouped[key].days.add(date.toDateString());
        }

    });

    let final = Object.values(grouped);
    let clusters={CP:[],BE:[],IT:[],OT:[]};

    /* FINAL MATCH LOGIC */
    final.forEach(d=>{

        const t = d.banner.toLowerCase();

        if(
            t.includes("copilot") ||
            t.includes("reseller") ||
            t.includes("cloud champion") ||
            t.includes("partner summit") ||
            t.includes("blitz") ||
            t.includes("maas") ||
            t.includes("marketplace") ||
            t.includes("summit") ||
            t.includes("expo") ||
            t.includes("event_")
        ){
            clusters.CP.push(d);
        }
        else if(
            t.includes("be_") ||
            t.includes("business") ||
            t.includes("dev") ||
            t.includes("data")
        ){
            clusters.BE.push(d);
        }
        else if(
            t.includes("erp") ||
            t.includes("acumatica") ||
            t.includes("dynamics")
        ){
            clusters.IT.push(d);
        }
        else{
            clusters.OT.push(d);
        }

    });

    renderCluster(clusters[activeCluster]);
}

/* Display */
function renderCluster(data){

    let banners={};

    data.forEach(d=>{
        if(!banners[d.banner]) banners[d.banner]=[];
        banners[d.banner].push(d);
    });

    let html="";

    Object.keys(banners).forEach(name=>{

        html+=`
        <div class="section">
            <div class="banner-title">${name}</div>

            <table>
            <tr>
                <th>Email</th>
                <th>Sender</th>
                <th>First Click</th>
                <th>Days Engaged</th>
            </tr>`;

        banners[name].forEach(r=>{
            html+=`
            <tr>
                <td>${r.email}</td>
                <td>${r.sender}</td>
                <td>${r.first.toLocaleString()}</td>
                <td>${r.days.size}</td>
            </tr>`;
        });

        html+=`</table></div>`;
    });

    output.innerHTML=html;
}

</script>

</body>
</html>
