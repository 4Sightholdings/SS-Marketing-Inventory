<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background: radial-gradient(circle at top,#0a2a5e,#001833 80%);
    color:white;
    padding:20px;
}

.header { text-align:center; margin-bottom:20px; }

.filters {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

button,input {
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    background:#0078d4;
    color:white;
    cursor:pointer;
}

.cluster-tabs {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

.cluster-tab {
    padding:8px 16px;
    background:rgba(255,255,255,0.2);
    border-radius:6px;
    cursor:pointer;
}

.cluster-tab.active {
    background:white;
    color:#002f6c;
}

.banner-header {
    padding:10px;
    margin-top:10px;
    background:rgba(255,255,255,0.15);
    border-radius:6px;
    cursor:pointer;
}

.banner-content {
    display:none;
}

table {
    width:100%;
    border-collapse:collapse;
}

th,td {
    padding:10px;
    text-align:left;
}

th { background:#002f6c; }
td { border-bottom:1px solid rgba(255,255,255,0.1); }
</style>
</head>

<body>

<div class="header">
<h1>4Sight Click Intelligence</h1>
</div>

<div class="filters">
<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>
<button onclick="clearAll()">Clear All</button>
</div>

<div class="cluster-tabs">
<div class="cluster-tab active" onclick="setCluster('CP')" id="c-CP">CP</div>
<div class="cluster-tab" onclick="setCluster('BE')" id="c-BE">BE</div>
<div class="cluster-tab" onclick="setCluster('IT')" id="c-IT">IT</div>
<div class="cluster-tab" onclick="setCluster('OT')" id="c-OT">OT</div>
</div>

<div id="output"></div>

<script>

let data = [];
let activeCluster = "CP";

/* ✅ Load saved data */
window.onload = () => {
    let s = localStorage.getItem("clickData");
    if (s) {
        data = JSON.parse(s);
        render();
    }
};

/* ✅ Upload */
function upload(){

    let file = fileInput.files[0];
    if(!file){
        alert("Please select a file");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        try{
            let wb = XLSX.read(e.target.result,{type:'array'});

            let sheet = wb.Sheets[wb.SheetNames[0]];
            data = XLSX.utils.sheet_to_json(sheet);

            console.log("Loaded data:", data);

            if(data.length === 0){
                alert("No data found in Excel file");
                return;
            }

            localStorage.setItem("clickData", JSON.stringify(data));

            render();

        } catch(err){
            console.error(err);
            alert("Error reading Excel file");
        }
    };

    reader.readAsArrayBuffer(file);
}

/* ✅ Clear */
function clearAll(){
    localStorage.removeItem("clickData");
    location.reload();
}

/* ✅ Cluster */
function setCluster(c){
    activeCluster = c;

    document.querySelectorAll(".cluster-tab").forEach(t=>t.classList.remove("active"));
    document.getElementById("c-"+c).classList.add("active");

    render();
}

/* ✅ Date parser */
function parseDate(v){
    if(!v) return null;

    if(typeof v === "number"){
        return new Date((v - 25569) * 86400 * 1000);
    }

    let d = new Date(v);
    return isNaN(d) ? null : d;
}

/* ✅ Render */
function render(){

    if(!data.length) return;

    let grouped = {};

    data.forEach(d=>{

        let tracker = d["Tracker"] || "";
        if(["Logo","Facebook","LinkedIn","Youtube"].includes(tracker)) return;

        let banner = d["Template"] || "Unknown";
        let email = d["Receiver"] || "Unknown";
        let sender = d["Sender"] || "";

        let date = parseDate(d["Time Clicked"]);
        if(!date) return;

        let key = email + "|" + banner;

        if(!grouped[key]){
            grouped[key] = {
                email,
                sender,
                banner,
                first: date,
                days: new Set([date.toDateString()])
            };
        } else {
            if(date < grouped[key].first) grouped[key].first = date;
            grouped[key].days.add(date.toDateString());
        }
    });

    let final = Object.values(grouped);

    let clusters = {CP:[], BE:[], IT:[], OT:[]};

    final.forEach(d=>{
        let t = d.banner.toLowerCase();

        if(t.includes("copilot") || t.includes("partner")) clusters.CP.push(d);
        else if(t.includes("business")) clusters.BE.push(d);
        else if(t.includes("erp")) clusters.IT.push(d);
        else clusters.OT.push(d);
    });

    renderCluster(clusters[activeCluster]);
}

/* ✅ Display */
function renderCluster(data){

    let banners = {};

    data.forEach(d=>{
        if(!banners[d.banner]) banners[d.banner] = [];
        banners[d.banner].push(d);
    });

    let html = "";

    Object.keys(banners).forEach(banner=>{

        html += `
        <div class="banner-header" onclick="toggle(this)">
        ${banner}
        </div>

        <div class="banner-content">
        <table>
        <tr>
            <th>Email</th>
            <th>Sender</th>
            <th>Date Clicked</th>
            <th>Days</th>
        </tr>`;

        banners[banner].forEach(r=>{
            html += `
            <tr>
                <td>${r.email}</td>
                <td>${r.sender}</td>
                <td>${r.first.toLocaleString()}</td>
                <td>${r.days.size}</td>
            </tr>`;
        });

        html += "</table></div>";
    });

    output.innerHTML = html;
}

/* ✅ Toggle */
function toggle(el){
    let c = el.nextElementSibling;
    c.style.display = (c.style.display==="block")?"none":"block";
}

</script>

</body>
</html>
``
