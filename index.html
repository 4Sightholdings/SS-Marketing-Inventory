<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background: radial-gradient(circle at top,#0a2a5e,#001833 80%);
    color:white;
    padding:20px;
}

/* HEADER */
.header { text-align:center; }
.header h1 { font-size:36px; }
.subtitle { color:#9bb7ff; margin-bottom:20px; }

/* FILTERS */
.filters {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}
input,button {
    padding:10px;
    border-radius:8px;
    border:none;
}

/* DATE PICKER STYLE */
.date-input {
    background:white;
    color:black;
}

button {
    background:#0078d4;
    color:white;
    cursor:pointer;
}

/* DASHBOARD */
.dashboard {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
}
.card {
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:8px;
    width:150px;
    text-align:center;
}
.value {
    font-size:22px;
    font-weight:bold;
}

/* TABS */
.tabs {
    display:flex;
    justify-content:center;
    margin-bottom:15px;
}
.tab {
    padding:8px 16px;
    margin:3px;
    border-radius:6px;
    background:rgba(255,255,255,0.2);
    cursor:pointer;
}
.tab.active {
    background:white;
    color:#002f6c;
}

/* CLUSTERS */
.cluster { display:none; }
.cluster.active { display:block; }

.cluster-title {
    padding:10px;
    border-radius:6px;
}

.cp { background:#ff4d4d; }
.be { background:#4da6ff; }
.it { background:#ffd633; color:black; }
.ot { background:#33cc99; }

/* BANNER BLOCK */
.banner-block {
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    background:rgba(255,255,255,0.08);
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}
th {
    background:#002f6c;
    padding:8px;
}
td {
    padding:6px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}
tr:hover td {
    background:rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="header">
<h1>4Sight Click Intelligence</h1>
<div class="subtitle">Interactive Campaign Engagement Dashboard</div>
</div>

<div class="filters">
<input type="file" id="fileInput">
<button id="deployBtn">Deploy</button>

<!-- ✅ DATE RANGE FILTER -->
<input type="date" id="startDate" class="date-input">
<input type="date" id="endDate" class="date-input">
</div>

<div class="dashboard">
<div class="card"><div id="total" class="value">--</div>Total</div>
<div class="card"><div id="leads" class="value">--</div>Leads</div>
</div>

<div class="tabs">
<div class="tab active" onclick="showCluster('CP')" id="tab-CP">CP</div>
<div class="tab" onclick="showCluster('BE')" id="tab-BE">BE</div>
<div class="tab" onclick="showCluster('IT')" id="tab-IT">IT</div>
<div class="tab" onclick="showCluster('OT')" id="tab-OT">OT</div>
</div>

<div id="CP" class="cluster active"><div class="cluster-title cp">Channel Partner</div><div id="cpTable"></div></div>
<div id="BE" class="cluster"><div class="cluster-title be">Business Environment</div><div id="beTable"></div></div>
<div id="IT" class="cluster"><div class="cluster-title it">IT</div><div id="itTable"></div></div>
<div id="OT" class="cluster"><div class="cluster-title ot">OT</div><div id="otTable"></div></div>

<script>

let rawData=[];

// SWITCH CLUSTERS
function showCluster(c){
    document.querySelectorAll(".cluster").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.getElementById(c).classList.add("active");
    document.getElementById("tab-"+c).classList.add("active");
}

// LOAD FILE
fileInput.addEventListener("change", e=>{
    let reader=new FileReader();

    reader.onload=(evt)=>{
        let wb=XLSX.read(evt.target.result,{type:'array'});
        rawData=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    };

    reader.readAsArrayBuffer(e.target.files[0]);
});

// DEPLOY
deployBtn.addEventListener("click", ()=>{
    if(rawData.length === 0) return;
    processData();
});

// DATE FILTER
function inRange(date){
    let start = startDate.value ? new Date(startDate.value) : null;
    let end = endDate.value ? new Date(endDate.value) : null;

    if(start && date < start) return false;
    if(end && date > end) return false;

    return true;
}

// PROCESS DATA
function processData(){

    let clean = rawData.filter(d =>
        !["Logo","Facebook","LinkedIn","Youtube"].includes(d.Tracker)
    );

    let grouped={};

    clean.forEach(d=>{
        let banner=d.Template||"Unknown";
        let email=d.Receiver||"Unknown";

        let date=new Date(d["Time Clicked"]);
        if(isNaN(date)) return;

        if(!inRange(date)) return;

        let key=email+"|"+banner;
        let day=date.toISOString().split("T")[0];

        if(!grouped[key]){
            grouped[key]={
                email,
                sender:d.Sender,
                banner,
                firstClick:date,
                days:new Set([day])
            };
        } else {
            if(date < grouped[key].firstClick){
                grouped[key].firstClick=date;
            }
            grouped[key].days.add(day);
        }
    });

    let final=Object.values(grouped);

    total.innerText=rawData.length;
    leads.innerText=final.length;

    let clusters={CP:[],BE:[],IT:[],OT:[]};

    final.forEach(d=>{
        let t=(d.banner||"").toLowerCase();

        if(t.includes("copilot") || t.includes("partner")) clusters.CP.push(d);
        else if(t.includes("be")) clusters.BE.push(d);
        else if(t.includes("it")) clusters.IT.push(d);
        else if(t.includes("ot")) clusters.OT.push(d);
    });

    render("cpTable",clusters.CP);
    render("beTable",clusters.BE);
    render("itTable",clusters.IT);
    render("otTable",clusters.OT);
}

// RENDER GROUPING
function render(id,data){

    let banners={};

    data.forEach(d=>{
        if(!banners[d.banner]) banners[d.banner]=[];
        banners[d.banner].push(d);
    });

    let html="";

    Object.keys(banners).forEach(banner=>{

        html+=`<div class="banner-block">
        <h3>${banner}</h3>

        <table>
        <tr>
            <th>Email</th>
            <th>Sender</th>
            <th>First Click</th>
            <th>Days</th>
        </tr>`;

        banners[banner].forEach(r=>{
            html+=`
            <tr>
                <td>${r.email}</td>
                <td>${r.sender}</td>
                <td>${r.firstClick.toLocaleString()}</td>
                <td>${r.days.size}</td>
            </tr>`;
        });

        html+="</table></div>";
    });

    document.getElementById(id).innerHTML=html;
}

// ✅ AUTO REFRESH WHEN DATE CHANGES
startDate.onchange=processData;
endDate.onchange=processData;

</script>

</body>
</html>
