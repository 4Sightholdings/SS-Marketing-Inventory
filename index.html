<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background: radial-gradient(circle at top,#0a2a5e,#001833 80%);
    color:white;
    padding:20px;
}

/* HEADER */
.header { text-align:center; margin-bottom:20px; }

/* BUTTONS */
.controls {
    text-align:center;
    margin-bottom:20px;
}
button,input {
    padding:10px;
    border-radius:8px;
    border:none;
}
button {
    background:#0078d4;
    color:white;
    cursor:pointer;
    margin:5px;
}

/* SUMMARY CARDS */
.cards {
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}
.card {
    flex:1;
    min-width:200px;
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
}
.metric {
    font-size:28px;
    font-weight:bold;
    color:#00e5ff;
}

/* CLUSTER TABS */
.cluster-tabs {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}
.cluster-tab {
    padding:8px 16px;
    background:rgba(255,255,255,0.2);
    border-radius:6px;
    cursor:pointer;
}
.cluster-tab.active {
    background:white;
    color:#002f6c;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}
th,td {
    padding:10px;
    text-align:left;
}
th { background:#002f6c; }
td { border-bottom:1px solid rgba(255,255,255,0.1); }

/* DROPDOWN */
.banner-header {
    padding:10px;
    margin-top:10px;
    background:rgba(255,255,255,0.15);
    border-radius:6px;
    cursor:pointer;
}
.banner-content { display:none; }

</style>
</head>

<body>

<div class="header">
<h1>🚀 4Sight Click Intelligence Dashboard</h1>
</div>

<div class="controls">
<input type="file" id="fileInput">
<button onclick="upload()">Upload Excel</button>
<button onclick="clearAll()">Clear Data</button>
</div>

<!-- ✅ SUMMARY CARDS -->
<div class="cards">
    <div class="card">
        <h3>Total Clicks</h3>
        <div id="totalClicks" class="metric">0</div>
    </div>
    <div class="card">
        <h3>Unique Users</h3>
        <div id="uniqueUsers" class="metric">0</div>
    </div>
    <div class="card">
        <h3>Unique Campaigns</h3>
        <div id="uniqueCampaigns" class="metric">0</div>
    </div>
</div>

<!-- CLUSTERS -->
<div class="cluster-tabs">
<div class="cluster-tab active" onclick="setCluster('CP')" id="c-CP">CP</div>
<div class="cluster-tab" onclick="setCluster('BE')" id="c-BE">BE</div>
<div class="cluster-tab" onclick="setCluster('IT')" id="c-IT">IT</div>
<div class="cluster-tab" onclick="setCluster('OT')" id="c-OT">OT</div>
</div>

<div id="output"></div>

<script>

let data=[];
let activeCluster="CP";

/* ✅ LOAD SAVED DATA */
window.onload=()=>{
    let s=localStorage.getItem("clickData");
    if(s){
        data=JSON.parse(s);
        render();
    }
};

/* ✅ UPLOAD */
function upload(){

    let file=fileInput.files[0];
    if(!file) return;

    let reader=new FileReader();

    reader.onload=(e)=>{
        let wb=XLSX.read(e.target.result,{type:'array'});
        data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

        localStorage.setItem("clickData",JSON.stringify(data));

        render();
    };

    reader.readAsArrayBuffer(file);
}

/* ✅ CLEAR */
function clearAll(){
    localStorage.removeItem("clickData");
    location.reload();
}

/* ✅ CLUSTER SWITCH */
function setCluster(c){
    activeCluster=c;
    document.querySelectorAll(".cluster-tab").forEach(t=>t.classList.remove("active"));
    document.getElementById("c-"+c).classList.add("active");
    render();
}

/* ✅ PROCESS + RENDER */
function render(){

    if(!data.length) return;

    document.getElementById("totalClicks").innerText=data.length;

    let users=new Set();
    let campaigns=new Set();

    let grouped={};

    data.forEach(d=>{

        let banner=d.Template||"Unknown";
        let email=d.Receiver||"Unknown";
        let date=new Date(d["Time Clicked"]);

        if(!date || isNaN(date)) return;

        users.add(email);
        campaigns.add(banner);

        let key=email+"|"+banner;

        if(!grouped[key]){
            grouped[key]={
                email,
                sender:d.Sender,
                banner,
                first:date,
                days:new Set([date.toDateString()])
            };
        } else {
            if(date < grouped[key].first) grouped[key].first=date;
            grouped[key].days.add(date.toDateString());
        }
    });

    document.getElementById("uniqueUsers").innerText=users.size;
    document.getElementById("uniqueCampaigns").innerText=campaigns.size;

    let final=Object.values(grouped);

    let clusters={CP:[],BE:[],IT:[],OT:[]};

    final.forEach(d=>{
        let t=d.banner.toLowerCase();

        if(t.includes("copilot")||t.includes("partner")) clusters.CP.push(d);
        else if(t.includes("business")) clusters.BE.push(d);
        else if(t.includes("erp")) clusters.IT.push(d);
        else clusters.OT.push(d);
    });

    renderCluster(clusters[activeCluster]);
}

/* ✅ DISPLAY */
function renderCluster(data){

    let banners={};

    data.forEach(d=>{
        if(!banners[d.banner]) banners[d.banner]=[];
        banners[d.banner].push(d);
    });

    let html="";

    Object.keys(banners).forEach(banner=>{

        html+=`
        <div class="banner-header" onclick="toggle(this)">
        ${banner}
        </div>

        <div class="banner-content">
        <table>
        <tr>
            <th>Email</th>
            <th>Sender</th>
            <th>First Click</th>
            <th>Days Engaged</th>
        </tr>`;

        banners[banner].forEach(r=>{
            html+=`
            <tr>
                <td>${r.email}</td>
                <td>${r.sender}</td>
                <td>${r.first.toLocaleString()}</td>
                <td>${r.days.size}</td>
            </tr>`;
        });

        html+="</table></div>";
    });

    output.innerHTML=html;
}

/* ✅ TOGGLE */
function toggle(el){
    let c=el.nextElementSibling;
    c.style.display=(c.style.display==="block")?"none":"block";
}

</script>

</body>
</html>
