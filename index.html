<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background:#0a2a5e;
    color:white;
    padding:20px;
}

/* HEADER */
.header {
    text-align:left;
    font-size:24px;
    margin-bottom:20px;
}

/* CONTROLS */
.filters {
    margin-bottom:20px;
}
button,input {
    padding:8px;
    border-radius:6px;
    border:none;
}
button {
    background:#0078d4;
    color:white;
    cursor:pointer;
}

/* DATASET TABS */
.dataset-tabs {
    margin-bottom:15px;
}
.dataset-tab {
    display:inline-block;
    padding:6px 12px;
    background:#1f4ea3;
    margin-right:5px;
    border-radius:6px;
    cursor:pointer;
}
.dataset-tab.active {
    background:white;
    color:#002f6c;
}

/* CLUSTERS */
.cluster-tabs {
    margin-bottom:20px;
}
.cluster-tab {
    display:inline-block;
    padding:6px 12px;
    background:#1f4ea3;
    margin-right:5px;
    border-radius:6px;
    cursor:pointer;
}
.cluster-tab.active {
    background:white;
    color:#002f6c;
}

/* GROUP BOX */
.group {
    background:#08224a;
    margin-bottom:20px;
    border-radius:10px;
    padding:10px;
}

/* GROUP HEADER */
.group-header {
    font-size:18px;
    padding:10px;
    background:#0f3b80;
    border-radius:8px;
    cursor:pointer;
}

/* TABLE */
.group-content {
    display:none;
    margin-top:10px;
}

table {
    width:100%;
}

th {
    text-align:left;
    background:#003366;
    padding:10px;
}

td {
    padding:8px;
    border-bottom:1px solid #1f4ea3;
}
</style>
</head>

<body>

<div class="header">4Sight Click Intelligence</div>

<div class="filters">
<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>
<button onclick="clearAll()">Clear</button>
</div>

<div id="datasetTabs" class="dataset-tabs"></div>

<div class="cluster-tabs">
<span class="cluster-tab active" onclick="setCluster('CP')" id="c-CP">CP</span>
<span class="cluster-tab" onclick="setCluster('BE')" id="c-BE">BE</span>
<span class="cluster-tab" onclick="setCluster('IT')" id="c-IT">IT</span>
<span class="cluster-tab" onclick="setCluster('OT')" id="c-OT">OT</span>
</div>

<div id="output"></div>

<script>

let datasets=[];
let activeDataset=0;
let activeCluster="CP";

/* LOAD */
window.onload = () => {
    let s = localStorage.getItem("clickDatasets");
    if(s){
        datasets = JSON.parse(s);
        renderDatasetTabs();
        render();
    }
};

/* UPLOAD */
function upload(){

    let file = fileInput.files[0];
    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(e){

        let wb = XLSX.read(e.target.result,{type:'array'});
        let sheet = wb.Sheets[wb.SheetNames[0]];

        let json = XLSX.utils.sheet_to_json(sheet,{
            defval:"",
            raw:false
        });

        let data = json.map(r=>{
            let clean={};
            Object.keys(r).forEach(k=>{
                clean[k.trim()] = r[k];
            });
            return clean;
        });

        datasets.unshift({label:file.name,data});
        localStorage.setItem("clickDatasets",JSON.stringify(datasets));

        activeDataset=0;
        renderDatasetTabs();
        render();
    };

    reader.readAsArrayBuffer(file);
}

/* CLEAR */
function clearAll(){
    localStorage.removeItem("clickDatasets");
    location.reload();
}

/* DATASET TABS */
function renderDatasetTabs(){
    let html="";
    datasets.forEach((d,i)=>{
        html += `<span class="dataset-tab ${i===activeDataset?'active':''}" onclick="setDataset(${i})">${d.label}</span>`;
    });
    datasetTabs.innerHTML=html;
}

function setDataset(i){
    activeDataset=i;
    renderDatasetTabs();
    render();
}

/* CLUSTER */
function setCluster(c){
    activeCluster=c;
    document.querySelectorAll(".cluster-tab").forEach(t=>t.classList.remove("active"));
    document.getElementById("c-"+c).classList.add("active");
    render();
}

/* DATE */
function parseDate(v){
    let d=new Date(v);
    return isNaN(d)?null:d;
}

/* MAIN */
function render(){

    if(!datasets.length) return;

    let raw=datasets[activeDataset].data;

    let grouped={};

    raw.forEach(d=>{

        let banner=d.Template||"Unknown";
        let email=d.Receiver||"Unknown";
        let sender=d.Sender||"";

        let date=parseDate(d["Time Clicked"]);
        if(!date) return;

        let key=email+"|"+banner;

        if(!grouped[key]){
            grouped[key]={
                email,sender,banner,
                first:date,
                days:new Set([date.toDateString()])
            };
        } else {
            if(date<grouped[key].first) grouped[key].first=date;
            grouped[key].days.add(date.toDateString());
        }
    });

    let final=Object.values(grouped);

    let clusters={CP:[],BE:[],IT:[],OT:[]};

    final.forEach(d=>{
        let t=d.banner.toLowerCase();

        if(t.includes("copilot")||t.includes("reseller")||t.includes("event_")||t.includes("expo")){
            clusters.CP.push(d);
        }
        else if(t.includes("business")||t.includes("dev")||t.includes("data")||t.includes("citizen")||t.includes("marketplace")){
            clusters.BE.push(d);
        }
        else if(t.includes("erp")||t.includes("acumatica")||t.includes("dynamics")){
            clusters.IT.push(d);
        }
        else{
            clusters.OT.push(d);
        }
    });

    renderCluster(clusters[activeCluster]);
}

/* VIEW */
function renderCluster(data){

    let banners={};

    data.forEach(d=>{
        if(!banners[d.banner]) banners[d.banner]=[];
        banners[d.banner].push(d);
    });

    let html="";

    Object.keys(banners).forEach(name=>{

        html+=`
        <div class="group">
            <div class="group-header" onclick="toggle(this)">
                ${name}
            </div>

            <div class="group-content">
                <table>
                    <tr>
                        <th>Email</th>
                        <th>Sender</th>
                        <th>First Click</th>
                        <th>Days</th>
                    </tr>`;

        banners[name].forEach(r=>{
            html+=`
                <tr>
                    <td>${r.email}</td>
                    <td>${r.sender}</td>
                    <td>${r.first.toLocaleString()}</td>
                    <td>${r.days.size}</td>
                </tr>`;
        });

        html+=`</table></div></div>`;
    });

    output.innerHTML=html;
}

/* TOGGLE */
function toggle(el){
    let c=el.nextElementSibling;
    c.style.display = c.style.display==="block" ? "none":"block";
}

</script>

</body>
</html>
