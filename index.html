<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>

body {
    font-family: Segoe UI;
    background:#0f2f63;
    color:white;
    margin:0;
    padding:0;
}

/* MAIN CONTAINER */
.container {
    padding:30px 40px;
}

/* HEADER */
h1 {
    font-weight:500;
    margin-bottom:20px;
}

/* BUTTON BAR */
.controls {
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:30px;
}

button,
input {
    padding:10px 12px;
    border-radius:6px;
    border:none;
    font-size:14px;
}

button {
    background:#1e88e5;
    color:white;
    cursor:pointer;
}

/* CLUSTER BUTTONS */
.cluster-tabs {
    margin-bottom:30px;
}

.cluster-tab {
    display:inline-block;
    padding:10px 18px;
    margin-right:10px;
    background:#2c4fa3;
    border-radius:10px;
    cursor:pointer;
}

.cluster-tab.active {
    background:white;
    color:#002f6c;
}

/* CARD CONTAINER */
.card {
    background:#173a78;
    border-radius:14px;
    padding:20px;
}

/* GROUP BLOCK */
.group {
    background:#1a4488;
    border-radius:10px;
    margin-bottom:15px;
}

/* GROUP HEADER */
.group-header {
    padding:14px;
    font-size:16px;
    border-bottom:1px solid rgba(255,255,255,0.1);
    cursor:pointer;
}

/* TABLE AREA */
.group-content {
    display:none;
    padding:15px;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}

th {
    text-align:left;
    padding:10px;
    background:#123265;
}

td {
    padding:8px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

</style>
</head>

<body>

<div class="container">

<h1>4Sight Click Intelligence</h1>

<div class="controls">
<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>
<button onclick="clearAll()">Clear</button>
</div>

<div class="cluster-tabs">
<span class="cluster-tab active" onclick="setCluster('CP')" id="c-CP">CP</span>
<span class="cluster-tab" onclick="setCluster('BE')" id="c-BE">BE</span>
<span class="cluster-tab" onclick="setCluster('IT')" id="c-IT">IT</span>
<span class="cluster-tab" onclick="setCluster('OT')" id="c-OT">OT</span>
</div>

<div class="card">
<div id="output"></div>
</div>

</div>

<script>

let data = [];
let activeCluster = "CP";

/* UPLOAD */
function upload(){

    let file = fileInput.files[0];
    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(e){

        let wb = XLSX.read(e.target.result,{type:'array'});

        let json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{
            defval:"",
            raw:false
        });

        data = json.map(r=>{
            let clean={};
            Object.keys(r).forEach(k=>{
                clean[k.trim()] = r[k];
            });
            return clean;
        });

        render();
    };

    reader.readAsArrayBuffer(file);
}

/* CLEAR */
function clearAll(){
    data=[];
    output.innerHTML="";
}

/* CLUSTER SWITCH */
function setCluster(c){
    activeCluster=c;

    document.querySelectorAll(".cluster-tab")
    .forEach(t=>t.classList.remove("active"));

    document.getElementById("c-"+c).classList.add("active");

    render();
}

/* DATE */
function parseDate(v){
    let d=new Date(v);
    return isNaN(d)?null:d;
}

/* RENDER */
function render(){

    if(!data.length) return;

    let grouped={};

    data.forEach(d=>{

        let banner=d.Template||"Unknown";
        let email=d.Receiver||"Unknown";
        let sender=d.Sender||"";

        let date=parseDate(d["Time Clicked"]);
        if(!date) return;

        let key=email+"|"+banner;

        if(!grouped[key]){
            grouped[key]={
                email,sender,banner,
                first:date,
                days:new Set([date.toDateString()])
            };
        } else {
            if(date<grouped[key].first) grouped[key].first=date;
            grouped[key].days.add(date.toDateString());
        }

    });

    let final=Object.values(grouped);
    let clusters={CP:[],BE:[],IT:[],OT:[]};

    final.forEach(d=>{
        let t=d.banner.toLowerCase();

        if(t.includes("copilot")||t.includes("reseller")||t.includes("event_")||t.includes("expo")){
            clusters.CP.push(d);
        }
        else if(t.includes("business")||t.includes("dev")||t.includes("data")){
            clusters.BE.push(d);
        }
        else if(t.includes("erp")||t.includes("acumatica")||t.includes("dynamics")){
            clusters.IT.push(d);
        }
        else{
            clusters.OT.push(d);
        }
    });

    renderCluster(clusters[activeCluster]);
}

/* GROUP VIEW */
function renderCluster(data){

    let banners={};

    data.forEach(d=>{
        if(!banners[d.banner]) banners[d.banner]=[];
        banners[d.banner].push(d);
    });

    let html="";

    Object.keys(banners).forEach(name=>{

        html+=`
        <div class="group">
            <div class="group-header" onclick="toggle(this)">
                ${name}
            </div>

            <div class="group-content">
                <table>
                    <tr>
                        <th>Email</th>
                        <th>Sender</th>
                        <th>First Click</th>
                        <th>Days</th>
                    </tr>`;

        banners[name].forEach(r=>{
            html+=`
                <tr>
                    <td>${r.email}</td>
                    <td>${r.sender}</td>
                    <td>${r.first.toLocaleString()}</td>
                    <td>${r.days.size}</td>
                </tr>`;
        });

        html+=`</table></div></div>`;
    });

    output.innerHTML=html;
}

/* TOGGLE */
function toggle(el){
    let c=el.nextElementSibling;
    c.style.display = c.style.display==="block"?"none":"block";
}

</script>

</body>
</html>
