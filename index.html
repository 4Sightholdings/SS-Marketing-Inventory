<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background: radial-gradient(circle at top,#0a2a5e,#001833 80%);
    color:white;
    padding:20px;
}

.header { text-align:center; margin-bottom:20px; }

button,input {
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    background:#0078d4;
    color:white;
    cursor:pointer;
    margin:5px;
}

.card {
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.metric {
    font-size:28px;
    font-weight:bold;
    color:#00e5ff;
}

table {
    width:100%;
    border-collapse:collapse;
}

th,td {
    padding:10px;
    text-align:left;
}

th { background:#002f6c; }
td { border-bottom:1px solid rgba(255,255,255,0.1); }

</style>
</head>

<body>

<div class="header">
<h1>🚀 4Sight Click Intelligence Dashboard</h1>
</div>

<div>
<input type="file" id="fileInput">
<button onclick="upload()">Upload Excel</button>
<button onclick="clearData()">Clear Data</button>
</div>

<div class="card">
<h2>Total Clicks</h2>
<div id="totalClicks" class="metric">0</div>
</div>

<div class="card">
<h2>Top Clicked URLs</h2>
<div id="topUrls"></div>
</div>

<div class="card">
<h2>Click Data</h2>
<table id="table"></table>
</div>

<script>

let data = [];

/* ✅ Auto-load data */
window.onload = () => {
    let saved = localStorage.getItem("clickData");
    if(saved){
        data = JSON.parse(saved);
        render();
    }
};

/* ✅ Upload Excel */
function upload(){

    let file = fileInput.files[0];
    if(!file) return;

    let reader = new FileReader();

    reader.onload = (e) => {
        let wb = XLSX.read(e.target.result, {type:'array'});
        data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

        localStorage.setItem("clickData", JSON.stringify(data));

        render();
    };

    reader.readAsArrayBuffer(file);
}

/* ✅ Clear */
function clearData(){
    localStorage.removeItem("clickData");
    location.reload();
}

/* ✅ Render dashboard */
function render(){

    document.getElementById("totalClicks").innerText = data.length;

    /* ✅ Top URLs */
    let counts = {};

    data.forEach(d=>{
        let url = d["Tracker"];
        if(!url) return;

        counts[url] = (counts[url] || 0) + 1;
    });

    let top = Object.entries(counts)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,5);

    let topHtml = "";

    top.forEach(([url,count])=>{
        topHtml += `<div>${url} (${count})</div>`;
    });

    document.getElementById("topUrls").innerHTML = topHtml;

    /* ✅ Table */
    let table = `
    <tr>
        <th>Email</th>
        <th>Sender</th>
        <th>Template</th>
        <th>Time Clicked</th>
    </tr>`;

    data.slice(0,50).forEach(d=>{
        table += `
        <tr>
            <td>${d["Receiver"]||""}</td>
            <td>${d["Sender"]||""}</td>
            <td>${d["Template"]||""}</td>
            <td>${d["Time Clicked"]||""}</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = table;
}

</script>

</body>
</html>
``
