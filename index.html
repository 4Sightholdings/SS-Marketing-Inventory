<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4Sight Click Intelligence</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Segoe UI;
    background: radial-gradient(circle at top,#0a2a5e,#001833 80%);
    color:white;
    padding:20px;
}

/* HEADER */
.header { text-align:center; }
.header h1 { font-size:36px; }

/* FILTER */
.filters {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}
button,input {
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    background:#0078d4;
    color:white;
    cursor:pointer;
}

/* WEEK TABS */
.week-tabs {
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:15px;
}
.week-tab {
    padding:8px 12px;
    background:rgba(255,255,255,0.2);
    border-radius:6px;
    cursor:pointer;
}
.week-tab.active {
    background:white;
    color:#002f6c;
}

/* CLUSTERS */
.cluster-title {
    padding:10px;
    border-radius:6px;
    margin-top:10px;
}

.cp { background:#ff4d4d; }
.be { background:#4da6ff; }
.it { background:#ffd633; color:black; }
.ot { background:#33cc99; }

/* DROPDOWN */
.banner-header {
    cursor:pointer;
    margin-top:10px;
    background:rgba(255,255,255,0.15);
    padding:10px;
    border-radius:6px;
}

.banner-content {
    display:none;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}
th,td {
    padding:10px;
    text-align:left;
}
th {
    background:#002f6c;
}
td {
    border-bottom:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="header">
<h1>4Sight Click Intelligence</h1>
</div>

<div class="filters">
<input type="file" id="fileInput">
<button onclick="uploadData()">Upload Week</button>
<button onclick="clearAll()">Clear All</button>
</div>

<div id="weekTabs" class="week-tabs"></div>

<div id="output"></div>

<script>

let datasets = [];
let activeIndex = 0;

/* LOAD STORAGE */
window.onload = function(){
    let saved = localStorage.getItem("clickDatasets");
    if(saved){
        datasets = JSON.parse(saved);
        renderTabs();
        renderData(activeIndex);
    }
};

/* FILE UPLOAD */
function uploadData(){

    let file = document.getElementById("fileInput").files[0];
    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(e){
        let wb = XLSX.read(e.target.result,{type:'array'});
        let data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

        let label = "Week " + (datasets.length + 1);

        datasets.push({
            label,
            raw:data
        });

        localStorage.setItem("clickDatasets", JSON.stringify(datasets));

        renderTabs();
        renderData(datasets.length - 1);

        document.getElementById("fileInput").value = "";
    };

    reader.readAsArrayBuffer(file);
}

/* CLEAR */
function clearAll(){
    localStorage.removeItem("clickDatasets");
    location.reload();
}

/* TABS */
function renderTabs(){

    let html = "";

    datasets.forEach((d,i)=>{
        html += `<div class="week-tab ${i===activeIndex?'active':''}" 
        onclick="renderData(${i})">${d.label}</div>`;
    });

    document.getElementById("weekTabs").innerHTML = html;
}

/* DATE FIX */
function parseDate(val){
    if(typeof val === "number"){
        return new Date((val-25569)*86400*1000);
    }
    let d = new Date(val);
    return isNaN(d)?null:d;
}

/* PROCESS + RENDER */
function renderData(index){

    activeIndex = index;
    renderTabs();

    let rawData = datasets[index].raw;

    let grouped = {};

    rawData.forEach(d=>{

        if(["Logo","Facebook","LinkedIn","Youtube"].includes(d.Tracker)) return;

        let banner=d.Template||"Unknown";
        let email=d.Receiver||"Unknown";
        let date=parseDate(d["Time Clicked"]);

        if(!date) return;

        let key=email+"|"+banner;

        if(!grouped[key]){
            grouped[key]={
                email,
                sender:d.Sender,
                banner,
                first:date,
                days:new Set([date.toDateString()])
            };
        } else {
            if(date < grouped[key].first) grouped[key].first = date;
            grouped[key].days.add(date.toDateString());
        }
    });

    let final = Object.values(grouped);

    // ✅ sort by engagement
    final.sort((a,b)=>b.days.size - a.days.size);

    let clusters={CP:[],BE:[],IT:[],OT:[]};

    final.forEach(d=>{
        let t=d.banner.toLowerCase();
        if(t.includes("copilot")||t.includes("partner")) clusters.CP.push(d);
        else if(t.includes("business")) clusters.BE.push(d);
        else if(t.includes("erp")||t.includes("webinar")) clusters.IT.push(d);
        else if(t.includes("ai")||t.includes("stages")) clusters.OT.push(d);
    });

    renderCluster("Channel Partner",clusters.CP,"cp");
    renderCluster("Business Environment",clusters.BE,"be");
    renderCluster("Information Technology",clusters.IT,"it");
    renderCluster("Operational Technology",clusters.OT,"ot");
}

/* RENDER CLUSTERS */
function renderCluster(title,data,className){

    let banners={};

    data.forEach(d=>{
        if(!banners[d.banner]) banners[d.banner]=[];
        banners[d.banner].push(d);
    });

    let html=`<div class="cluster-title ${className}">${title}</div>`;

    Object.keys(banners).forEach(banner=>{

        html+=`
        <div class="banner-header" onclick="toggle(this)">
        ${banner}
        </div>

        <div class="banner-content">
        <table>
        <tr>
            <th>Email</th>
            <th>Sender</th>
            <th>Date Clicked</th>
            <th>Days</th>
        </tr>`;

        banners[banner].forEach(r=>{
            html+=`
            <tr>
                <td>${r.email}</td>
                <td>${r.sender}</td>
                <td>${r.first.toLocaleString()}</td>
                <td>${r.days.size}</td>
            </tr>`;
        });

        html+="</table></div>";
    });

    document.getElementById("output").innerHTML += html;
}

/* DROPDOWN */
function toggle(el){
    let c = el.nextElementSibling;
    c.style.display = (c.style.display==="block")?"none":"block";
}

</script>

</body>
</html>
